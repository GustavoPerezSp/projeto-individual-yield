<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quanto Investir</title>
    <script src="../js/sessao.js"></script>
    <link rel="stylesheet" href="assets/css/calculator.css">
</head>

<body>

    <div class="header">

        <div class="logo">
            <a href="">YieldWay</a>
        </div>

        <div class="links">
            <a href="index.html">Página Inicial</a>
            <a href="calculadoras.html">Calculadoras</a>
        </div>

        <div class="account">
            <div class="notLoggedIn" id="notLoggedIn">
                <a href="login.html">Login</a>
                <a href="cadastro.html" class="register">Cadastre-se</a>
            </div>

            <div class="loggedIn" id="loggedIn">
                <p class="greeting">Olá, <span id="sUsername"></span>!</p>
                <p class="goodbye" onclick="limparSessao()">Sair da Conta</p>
            </div>


        </div>

    </div class="header">

    <div class="calculator_container">
        <div class="calculator__field">
            <label for="iMonthlyRending">Digite sua Renda Mensal:</label>
            <input type="number" id="iMonthlyRending">
        </div>

        <div class="calculator__field">
            <label for="iMonthlyExpenses">Digite o Total de Gastos Fixos Mensal:</label>
            <input type="number" id="iMonthlyExpenses">
        </div>

        <button class="calculator__button" onclick="calculateMonthlyInvestment()">Calcular</button>

        <div id="dShow"></div>

    </div>


</body>

</html>

<script>

    if (sessionStorage.ID_USUARIO != null) {
        sUsername.innerHTML = sessionStorage.NOME_USUARIO
        document.getElementById("loggedIn").style.display = "flex"
    } else {
        document.getElementById("notLoggedIn").style.display = "flex"
    }

</script>

<script>

    function calculateMonthlyInvestment() {
        let monthlyRending = Number(iMonthlyRending.value);
        let monthlyExpenses = Number(iMonthlyExpenses.value);
        let leftover = monthlyRending - monthlyExpenses;

        dShow.innerHTML = `Você poderia Investir R$ ${leftover * 0.1} por mês`;
    }
</script>
