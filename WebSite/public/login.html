<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Faça Login na Sua Conta!</title>
    <script src="./js/sessao.js"></script>
    <link rel="preconnect" href="https://fonts.gstatic.com">

    <link rel="stylesheet" href="assets/css/styles.css">
</head>

<body>

    <div class="login__content">

        <div class="login__card login__logo">

            <div class="login__messages" id="login__messages">
                <span class="error_message" id="error_message"></span>
            </div>

            <div class="login__logo__background">
                <img src="assets/images/moeda inclinada.png" alt="Moeda com texto YW">
            </div>
        </div>

        <div class="login__card">
            <div id="login__greetings">
                <h1>Bem vindo Yielder!</h1>
                <p class="login__text">Acesse sua conta para saber o que está acontecendo
                    com seus investimentos!</p>
            </div>

            <div class="login__form">

                <label for="iEmail">Email</label>
                <input class="login__form__input" type="text" name="" id="iEmail">

                <label for="iPassword">Senha</label>
                <input class="login__form__input" type="password" name="" id="iPassword">

                <a id="login__form__button" href="#" onclick="entrar()">Entrar</a>
            </div>

            <p class="login__form__createacc">Ainda Não Tem uma Conta? <a href="cadastro.html">Cadastre-se!</a></p>

        </div>

    </div>

</body>

</html>

<script>


    function entrar() {
        aguardar();

        var emailVar = iEmail.value;
        var senhaVar = iPassword.value;

        if (emailVar == "" || senhaVar == "") {
            login__messages.style.display = "block"
            error_message.innerHTML = "Por favor, preencha os campos em branco!";
            finalizarAguardar();
            return false;
        }
        else {
            setInterval(sumirMensagem, 5000)
        }

        console.log("FORM LOGIN: ", emailVar);
        console.log("FORM SENHA: ", senhaVar);

        fetch("/usuarios/autenticar", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({
                emailServer: emailVar,
                senhaServer: senhaVar
            })
        }).then(function (resposta) {
            console.log("ESTOU NO THEN DO entrar()!")

            if (resposta.ok) {
                console.log(resposta);

                resposta.json().then(json => {
                    console.log(json);
                    console.log(JSON.stringify(json));
                    sessionStorage.EMAIL_USUARIO = json.email;
                    sessionStorage.NOME_USUARIO = json.nome;
                    sessionStorage.ID_USUARIO = json.id;

                    document.getElementById('login__messages').style.display = "block";
                    document.getElementById('error_message').innerHTML = "Login Realizado com Sucesso!<br> Redirecionando para Dashboard...";

                    setTimeout(function () {
                        window.location = "/dashboard/dashboard.html";
                    }, 1000); // apenas para exibir o loading

                });

            } else {
                document.getElementById('login__messages').style.display = "block";
                document.getElementById('error_message').innerHTML = "Email e/ou Senha Inválidos!";
                setInterval(sumirMensagem, 5000)

                console.log("Houve um erro ao tentar realizar o login!");

                resposta.text().then(texto => {
                    console.error(texto);
                    finalizarAguardar(texto);
                });
            }

        }).catch(function (erro) {
            console.log(erro);
        })

        return false;
    }

    function sumirMensagem() {
        login__messages.style.display = "none"
    }

</script>
