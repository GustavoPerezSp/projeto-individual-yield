<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>yielDash</title>
    <link rel="stylesheet" href="../assets/css/dashboard.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>

    <div id="content">

        <div class="header">

            <div class="logo">
                <a href="">YieldWay</a>
            </div>

            <div class="links">
                <a href="../index.html">Voltar para Home</a>
                <a href="">Meu Perfil</a>
                <a href="">Gerenciador</a>
            </div>

            <div class="account">
                <button onclick="alert(`asada`)">Adicionar Novo Lançamento</button>
                <p>Olá, <span id="sUsername"></span>!</p>
            </div>

        </div class="header">

        <div class="new_investment">
            <div class="new__inputs">
                <div class="column">
                    <div class="column__input">
                        <label for="sStockType">Tipo de Ativo</label>
                        <select id="sStockType">
                            <option value="acao">Ação</option>
                            <option value="fundo">FIIs</option>
                            <option value="rendaFixa">Renda Fixa</option>
                        </select>

                        <div class="column__input">
                            <label for="iPurchaseDate">Data da Compra</label>
                            <input type="date" id="iPurchaseDate">
                        </div>

                        <div class="column__input">
                            <label for="iPrice">Preço em R$</label>
                            <input type="number" id="iPrice" oninput="pricing()">
                        </div>

                    </div>
                </div>
                <div class="column">
                    <div class="column__input">
                        <label for="iTicker">Ticker Do Ativo</label>
                        <input type="text" id="iTicker">
                    </div>

                    <div class="column__input">
                        <label for="iQuantity">Quantidade</label>
                        <input type="number" id="iQuantity" oninput="pricing()">
                    </div>
                </div>
            </div>

            <div class="new__total">
                <h2>Total: R$ <span id="totalPrice"></span></h2>
            </div>

            <div class="new__buttons">
                <button>Cancelar</button>
                <button id="confirmButton" onclick="alert(`lancado`)">Fazer Lançamento</button>
            </div>

        </div>

        <div class="kpis_graphs">
            <div class="kpis_graphs__kpis">

                <div class="kpis_graphs__kpi">
                    <h6>Patrimônio Total</h6>
                    <p>R$ <span id="valorPatrimonio"></span></p>
                </div>

                <div class="kpis_graphs__kpi">
                    <h6>Lucro Total</h6>
                    <p>R$ <span id="valorLucro"></span></p>
                </div>

                <div class="kpis_graphs__kpi">
                    <h6>Proventos Recebidos</h6>
                    <p>R$ <span id="valorProventos"></span></p>
                </div>

                <div class="kpis_graphs__kpi">
                    <h6>Variação</h6>
                    <p><span id="valorVariacao"></span>%</p>
                </div>
            </div>

            <div class="kpis_graphs__graphs">
                <div class="barChart">
                    <canvas id="barGraph"></canvas>
                </div>
                <div class="pieChart">
                    <canvas id="pieGraph"></canvas>
                </div>
            </div>
        </div>

    </div>

</body>

</html>

<script>
    sUsername.innerHTML += sessionStorage.NOME_USUARIO

    function pricing(){
        let price = Number(iPrice.value);
        let quantity = Number(iQuantity.value);

        let finalPrice = price * quantity;

        totalPrice.innerHTML = finalPrice.toFixed(2)
    }
</script>

<script>
    const ctx = document.getElementById('barGraph');

    new Chart(ctx, {
        type: 'bar',
        data: {
            labels: ['Jan', 'Fev', 'Mar', 'Abr', 'Maio', 'Jun'],
            datasets: [{
                label: 'Yield Com o Passar do Tempo',
                data: [12, 19, 3, 5, 2, 3],
                borderWidth: 1,
                backgroundColor: [
                    '#FDC409',
                    '#111111',
                    '#E09B2D'
                ]
            }]
        },
        options: {
            scales: {
                y: {
                    beginAtZero: true
                }
            }
        }
    });

    const ctz = document.getElementById('pieGraph');

    new Chart(ctz, {
        type: 'pie',
        data: {
            labels: [
                'Renda Fixa',
                'Ações',
                'FIIs'
            ],
            datasets: [{
                label: 'My First Dataset',
                data: [300, 750, 700],
                backgroundColor: [
                    'rgb(255, 99, 132)',
                    'rgb(54, 162, 235)',
                    'rgb(255, 205, 86)'
                ],
                hoverOffset: 4
            }]
        },
    });
</script>
